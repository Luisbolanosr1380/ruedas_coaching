<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rueda de Coaching</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --color-principal: #1D9E75;
    --bg: #FAFAF7;
    --surface: #FFFFFF;
    --text-primary: #1A1A1A;
    --text-secondary: #595959;
    --text-muted: #8A8A8A;
    --border: #E5E5E0;
    --border-strong: #BFBFB8;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
    line-height: 1.6;
  }
  .container {
    max-width: 980px;
    margin: 0 auto;
    padding: 32px 24px 64px;
  }

  /* ---------- Loading ---------- */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    color: var(--text-secondary);
  }
  .spinner {
    width: 32px; height: 32px;
    border: 2.5px solid var(--border);
    border-top-color: var(--color-principal);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- Header ---------- */
  .header {
    margin-bottom: 32px;
  }
  .badge {
    display: inline-block;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--color-principal);
    background: color-mix(in srgb, var(--color-principal) 10%, transparent);
    padding: 6px 12px;
    border-radius: 100px;
    margin-bottom: 16px;
  }
  h1 {
    font-size: 32px;
    font-weight: 600;
    margin: 0 0 12px;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }
  .saludo {
    font-size: 16px;
    color: var(--text-secondary);
    margin: 0 0 8px;
  }
  .descripcion {
    font-size: 15px;
    color: var(--text-secondary);
    margin: 16px 0 0;
    line-height: 1.65;
  }

  /* ---------- Main grid ---------- */
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
  }
  @media (min-width: 820px) {
    .grid {
      grid-template-columns: 1fr 1.05fr;
      gap: 32px;
      align-items: start;
    }
  }

  .card {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    padding: 24px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin: 0 0 20px;
  }

  /* ---------- Sliders ---------- */
  .sliders { display: flex; flex-direction: column; gap: 18px; }
  .slider-row {
    display: grid;
    grid-template-columns: 1fr auto;
    grid-template-rows: auto auto;
    gap: 4px 12px;
    align-items: center;
  }
  .slider-label {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
  }
  .slider-value {
    font-size: 14px;
    font-weight: 600;
    color: var(--color-principal);
    background: color-mix(in srgb, var(--color-principal) 10%, transparent);
    min-width: 34px;
    height: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    font-variant-numeric: tabular-nums;
  }
  input[type="range"] {
    grid-column: 1 / -1;
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    background: var(--border);
    border-radius: 100px;
    outline: none;
    margin: 4px 0;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 22px; height: 22px;
    background: var(--color-principal);
    border: 3px solid var(--surface);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 0 1px var(--color-principal), 0 2px 6px rgba(0,0,0,0.12);
    transition: transform 0.12s;
  }
  input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.1); }
  input[type="range"]::-moz-range-thumb {
    width: 22px; height: 22px;
    background: var(--color-principal);
    border: 3px solid var(--surface);
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 0 1px var(--color-principal);
  }

  /* ---------- Radar visualization ---------- */
  .radar-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #radar { width: 100%; max-width: 380px; height: auto; }
  .stats {
    display: flex;
    gap: 12px;
    margin-top: 20px;
    width: 100%;
  }
  .stat {
    flex: 1;
    text-align: center;
    padding: 14px 12px;
    background: var(--bg);
    border-radius: 12px;
  }
  .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 4px;
    font-weight: 500;
  }
  .stat-value {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .stat-value.small { font-size: 13px; line-height: 1.3; }

  /* ---------- Reflections ---------- */
  .reflexiones {
    margin-top: 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .reflexion-item label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 8px;
    color: var(--text-primary);
  }
  textarea {
    width: 100%;
    min-height: 80px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    font-family: inherit;
    font-size: 14px;
    color: var(--text-primary);
    resize: vertical;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  textarea:focus {
    outline: none;
    border-color: var(--color-principal);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--color-principal) 15%, transparent);
  }

  /* ---------- Submit ---------- */
  .submit-wrap {
    margin-top: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .btn-submit {
    background: var(--color-principal);
    color: #fff;
    border: none;
    padding: 14px 36px;
    font-size: 15px;
    font-weight: 600;
    border-radius: 100px;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.12s, box-shadow 0.12s, opacity 0.15s;
    box-shadow: 0 2px 8px color-mix(in srgb, var(--color-principal) 30%, transparent);
  }
  .btn-submit:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 4px 14px color-mix(in srgb, var(--color-principal) 40%, transparent);
  }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .submit-hint { font-size: 13px; color: var(--text-muted); }

  /* ---------- Estados finales ---------- */
  .estado-final {
    background: var(--surface);
    border-radius: 16px;
    border: 1px solid var(--border);
    padding: 48px 32px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .estado-icon {
    font-size: 48px;
    margin-bottom: 16px;
    display: block;
  }
  .estado-titulo {
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 8px;
  }
  .estado-mensaje {
    color: var(--text-secondary);
    margin: 0;
  }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="loading">
    <div class="spinner"></div>
    <p>Cargando tu rueda...</p>
  </div>
</div>

<script>
(function() {
  const app = document.getElementById('app');
  let state = { config: null, valores: {}, ruedaId: null };

  // Extraer token de la URL: /rueda/XXXXX  o  ?token=XXXXX
  function getToken() {
    const pathMatch = window.location.pathname.match(/\/rueda\/(.+)$/);
    if (pathMatch) return decodeURIComponent(pathMatch[1]);
    const params = new URLSearchParams(window.location.search);
    return params.get('token');
  }

  async function cargar() {
    const token = getToken();
    if (!token) {
      mostrarError('Link inválido', 'No se encontró el token de acceso en el link.');
      return;
    }
    try {
      const resp = await fetch('/api/rueda?token=' + encodeURIComponent(token));
      const data = await resp.json();
      if (!resp.ok) {
        mostrarError('No pudimos cargar tu rueda', data.error || 'Error desconocido');
        return;
      }
      if (data.completada) {
        mostrarMensaje('✓', 'Rueda completada', data.mensaje);
        return;
      }
      state.config = data;
      state.ruedaId = data.ruedaId;
      data.segmentos.forEach(s => { state.valores[s.indice] = 5; });
      renderizar();
    } catch (e) {
      mostrarError('Error de conexión', 'No pudimos conectar con el servidor. Revisa tu internet e intenta de nuevo.');
    }
  }

  function mostrarError(titulo, mensaje) {
    mostrarMensaje('⚠', titulo, mensaje);
  }
  function mostrarMensaje(icon, titulo, mensaje) {
    app.innerHTML = `
      <div class="estado-final">
        <span class="estado-icon">${icon}</span>
        <h2 class="estado-titulo">${titulo}</h2>
        <p class="estado-mensaje">${mensaje}</p>
      </div>`;
  }

  function renderizar() {
    const c = state.config;
    document.documentElement.style.setProperty('--color-principal', c.colorPrincipal);

    const saludo = c.nombreCliente ? `<p class="saludo">Hola, ${c.nombreCliente}</p>` : '';
    const descripcion = c.descripcion ? `<p class="descripcion">${c.descripcion}</p>` : '';

    const slidersHtml = c.segmentos.map(s => `
      <div class="slider-row">
        <span class="slider-label">${s.nombre}</span>
        <span class="slider-value" id="val-${s.indice}">5</span>
        <input type="range" min="1" max="10" step="1" value="5" data-i="${s.indice}" />
      </div>
    `).join('');

    const reflexionesHtml = `
      <div class="card reflexiones">
        <h3 class="card-title">Reflexión sobre tus resultados</h3>
        <div class="reflexion-item">
          <label>¿Cómo te sientes acerca de tus resultados?</label>
          <textarea id="r1"></textarea>
        </div>
        <div class="reflexion-item">
          <label>¿Tu rueda está bien equilibrada o desequilibrada?</label>
          <textarea id="r2"></textarea>
        </div>
        <div class="reflexion-item">
          <label>¿Qué hábitos o rutinas podrías cambiar para mejorar tus resultados?</label>
          <textarea id="r3"></textarea>
        </div>
        <div class="reflexion-item">
          <label>Si no cambias nada, ¿cuáles son las consecuencias a largo plazo?</label>
          <textarea id="r4"></textarea>
        </div>
        <div class="reflexion-item">
          <label>¿Cómo repercutirían positivamente estos cambios en tu vida, a corto y largo plazo?</label>
          <textarea id="r5"></textarea>
        </div>
      </div>`;

    app.innerHTML = `
      <div class="header">
        <span class="badge">Rueda de ${c.tipoRueda}</span>
        ${saludo}
        <h1>Tu rueda actual</h1>
        ${descripcion}
      </div>
      <div class="grid">
        <div class="card">
          <h3 class="card-title">Puntúa cada área (1 a 10)</h3>
          <div class="sliders">${slidersHtml}</div>
        </div>
        <div class="card radar-wrap">
          <h3 class="card-title" style="align-self: flex-start;">Tu rueda en vivo</h3>
          <svg id="radar" viewBox="0 0 360 360"></svg>
          <div class="stats">
            <div class="stat">
              <div class="stat-label">Promedio</div>
              <div class="stat-value" id="avg">5.0</div>
            </div>
            <div class="stat">
              <div class="stat-label">${c.escalaInvertida ? 'Más estresante' : 'Área más baja'}</div>
              <div class="stat-value small" id="lowest">—</div>
            </div>
          </div>
        </div>
      </div>
      ${reflexionesHtml}
      <div class="submit-wrap">
        <button class="btn-submit" id="enviar">Enviar mi rueda</button>
        <p class="submit-hint">Recibirás una copia y tu coach analizará los resultados.</p>
      </div>`;

    document.querySelectorAll('input[type="range"]').forEach(input => {
      input.addEventListener('input', e => {
        const i = parseInt(e.target.dataset.i);
        const v = parseInt(e.target.value);
        state.valores[i] = v;
        document.getElementById('val-' + i).textContent = v;
        dibujarRadar();
      });
    });
    document.getElementById('enviar').addEventListener('click', enviar);
    dibujarRadar();
  }

  function dibujarRadar() {
    const svg = document.getElementById('radar');
    const segs = state.config.segmentos;
    const n = segs.length;
    const cx = 180, cy = 180, maxR = 110;
    const color = state.config.colorPrincipal;

    // Para escala invertida (estrés), interpretar visualmente al revés:
    // en estrés un 10 es "malo" pero igual lo mostramos como 10 en la rueda
    // (el coach lee la rueda llena = mucho estrés)
    const valorParaRadar = (v) => v;

    let html = '';
    // Anillos guía
    [2, 4, 6, 8, 10].forEach(level => {
      const r = (level / 10) * maxR;
      const pts = [];
      for (let i = 0; i < n; i++) {
        const a = (Math.PI * 2 * i) / n - Math.PI / 2;
        pts.push((cx + Math.cos(a) * r).toFixed(1) + ',' + (cy + Math.sin(a) * r).toFixed(1));
      }
      const opacity = level === 10 ? 0.3 : 0.15;
      html += `<polygon points="${pts.join(' ')}" fill="none" stroke="#000" stroke-opacity="${opacity}" stroke-width="0.5" />`;
    });

    // Ejes
    for (let i = 0; i < n; i++) {
      const a = (Math.PI * 2 * i) / n - Math.PI / 2;
      html += `<line x1="${cx}" y1="${cy}" x2="${(cx + Math.cos(a) * maxR).toFixed(1)}" y2="${(cy + Math.sin(a) * maxR).toFixed(1)}" stroke="#000" stroke-opacity="0.12" stroke-width="0.5" />`;
    }

    // Polígono de datos
    const dataPts = segs.map((s, i) => {
      const a = (Math.PI * 2 * i) / n - Math.PI / 2;
      const v = valorParaRadar(state.valores[s.indice] || 1);
      const r = (v / 10) * maxR;
      return [cx + Math.cos(a) * r, cy + Math.sin(a) * r];
    });
    html += `<polygon points="${dataPts.map(p => p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ')}" fill="${color}" fill-opacity="0.22" stroke="${color}" stroke-width="2" stroke-linejoin="round" />`;
    dataPts.forEach(p => {
      html += `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3.5" fill="${color}" stroke="#fff" stroke-width="1.5" />`;
    });

    // Etiquetas
    for (let i = 0; i < n; i++) {
      const a = (Math.PI * 2 * i) / n - Math.PI / 2;
      const lr = maxR + 26;
      const x = cx + Math.cos(a) * lr;
      const y = cy + Math.sin(a) * lr;
      const anchor = Math.abs(Math.cos(a)) < 0.25 ? 'middle' : Math.cos(a) > 0 ? 'start' : 'end';
      const words = segs[i].nombre.split(' ');
      let line1, line2 = '';
      if (words.length <= 2) {
        line1 = segs[i].nombre;
      } else {
        const mid = Math.ceil(words.length / 2);
        line1 = words.slice(0, mid).join(' ');
        line2 = words.slice(mid).join(' ');
      }
      html += `<text x="${x.toFixed(1)}" y="${y.toFixed(1)}" text-anchor="${anchor}" font-size="11" font-weight="500" fill="#1A1A1A" font-family="Inter, sans-serif">
        <tspan x="${x.toFixed(1)}" dy="0">${line1}</tspan>
        ${line2 ? `<tspan x="${x.toFixed(1)}" dy="13" fill="#595959">${line2}</tspan>` : ''}
      </text>`;
    }

    svg.innerHTML = html;

    // Stats
    const vals = Object.values(state.valores);
    const avg = vals.reduce((s, v) => s + v, 0) / vals.length;
    document.getElementById('avg').textContent = avg.toFixed(1);

    // Encontrar segmento crítico
    let critico = segs[0];
    let valorCritico = state.valores[segs[0].indice];
    segs.forEach(s => {
      const v = state.valores[s.indice];
      if (state.config.escalaInvertida) {
        if (v > valorCritico) { valorCritico = v; critico = s; }
      } else {
        if (v < valorCritico) { valorCritico = v; critico = s; }
      }
    });
    document.getElementById('lowest').textContent = `${critico.nombre} (${valorCritico})`;
  }

  async function enviar() {
    const btn = document.getElementById('enviar');
    btn.disabled = true;
    btn.textContent = 'Enviando...';

    const reflexiones = {
      r1: document.getElementById('r1').value.trim(),
      r2: document.getElementById('r2').value.trim(),
      r3: document.getElementById('r3').value.trim(),
      r4: document.getElementById('r4').value.trim(),
      r5: document.getElementById('r5').value.trim()
    };

    try {
      const resp = await fetch('/api/enviar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          ruedaId: state.ruedaId,
          segmentos: state.valores,
          reflexiones
        })
      });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.error || 'Error al enviar');
      mostrarMensaje('✓', '¡Listo!', 'Recibimos tus respuestas. Tu coach las revisará y se pondrá en contacto para conversar sobre los resultados.');
    } catch (e) {
      btn.disabled = false;
      btn.textContent = 'Enviar mi rueda';
      alert('Hubo un problema enviando tus respuestas. Por favor intenta de nuevo.');
    }
  }

  cargar();
})();
</script>
</body>
</html>
